name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # (a) Linters and type checks: ruff (Python), eslint + tsc (dashboard).
  lint:
    name: lint and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install server package
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff
        working-directory: server
        run: ruff check .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci

      - name: eslint
        working-directory: dashboard
        run: npm run lint

      - name: tsc --noEmit
        working-directory: dashboard
        run: npm run typecheck

  # (b) Python tests. Unit tests need no services; the db-marked integration
  # tests run against a throwaway Postgres with the migration applied. The same
  # postgres:16 service as the migrations job is used so RLS is exercised for
  # real (they skip locally when no database is reachable).
  test:
    name: pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crashlens
          POSTGRES_PASSWORD: crashlens
          POSTGRES_DB: crashlens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crashlens -d crashlens"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install server package
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply migrations
        working-directory: server
        env:
          DATABASE_URL: postgresql+asyncpg://crashlens:crashlens@localhost:5432/crashlens
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-not-a-real-key
        run: alembic upgrade head

      - name: Run tests
        working-directory: server
        env:
          DATABASE_URL: postgresql+asyncpg://crashlens:crashlens@localhost:5432/crashlens
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-not-a-real-key
        run: pytest -q -m "db or not db"

  # (c) Migrations must be reversible: upgrade to head then downgrade to base
  # against a throwaway Postgres service container.
  migrations:
    name: alembic upgrade and downgrade
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crashlens
          POSTGRES_PASSWORD: crashlens
          POSTGRES_DB: crashlens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crashlens -d crashlens"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install server package
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Upgrade to head then downgrade to base
        working-directory: server
        env:
          DATABASE_URL: postgresql+asyncpg://crashlens:crashlens@localhost:5432/crashlens
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-migration-secret-not-a-real-key
        run: |
          alembic upgrade head
          alembic downgrade base

  # (d) Secret scan over the full history.
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_SUMMARY: "true"

  # (e) Cross-tenant isolation gate. HARD-FAILING (no continue-on-error): every
  # test marked ``isolation`` must prove Tenant A cannot read or act on Tenant
  # B's data (403 at the HTTP authZ layer, empty/denied at the RLS layer). Same
  # postgres:16 service and migration pattern as the ``test`` job above so RLS
  # is exercised for real. Landed for W1-04.
  cross-tenant-isolation:
    name: cross-tenant isolation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crashlens
          POSTGRES_PASSWORD: crashlens
          POSTGRES_DB: crashlens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crashlens -d crashlens"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install server package
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply migrations
        working-directory: server
        env:
          DATABASE_URL: postgresql+asyncpg://crashlens:crashlens@localhost:5432/crashlens
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-not-a-real-key
        run: alembic upgrade head

      - name: Run cross-tenant isolation tests
        working-directory: server
        env:
          DATABASE_URL: postgresql+asyncpg://crashlens:crashlens@localhost:5432/crashlens
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-not-a-real-key
        run: pytest -q -m isolation

  # (f) Dashboard production build.
  dashboard-build:
    name: dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci
      - name: Build
        working-directory: dashboard
        run: npm run build
